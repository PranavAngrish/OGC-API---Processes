services:

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html/ui:ro
    depends_on:
      pygeoapi:
        condition: service_healthy
      auth:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ogc-internal


  auth:
    build: ./auth
    expose:
      - "5000"
    volumes:
      - auth-data:/data
    environment:
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-in-production-min-32-chars}
      TOKEN_EXPIRY_SECONDS: ${TOKEN_EXPIRY_SECONDS:-3600}
      DATA_DIR: /data
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/auth/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - ogc-internal

  pygeoapi:
    build: .
    command: run
    expose:
      - "80"
    volumes:
      - ./config/pygeoapi-config.yml:/pygeoapi-config.yml:ro
      - ./processes:/pygeoapi/processes:ro
    environment:
      PYGEOAPI_CONFIG: /pygeoapi-config.yml
      PYGEOAPI_OPENAPI: /pygeoapi-openapi.yml
      PYTHONPATH: /pygeoapi
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80/')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
    restart: unless-stopped
    networks:
      - ogc-internal

volumes:
  auth-data:

networks:
  ogc-internal:
    driver: bridge
