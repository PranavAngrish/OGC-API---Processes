events {
    worker_connections 1024;
}

http {

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    limit_req_zone $binary_remote_addr zone=ogc_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

    server {
        listen 80;
        server_name localhost;

        access_log /var/log/nginx/ogc-access.log;
        error_log  /var/log/nginx/ogc-error.log warn;

        default_type application/problem+json;

        # ── Frontend UI ──────────────────────────────────────────────────────
        location /ui {
            alias /usr/share/nginx/html/ui;
            index index.html;
            try_files $uri $uri/ /ui/index.html;
            add_header Cache-Control "no-cache";
        }

        # ── Auth service — public (login, register, health) ──────────────────
        location /auth/ {
            limit_req zone=auth_limit burst=10 nodelay;

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  "*";
                add_header Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS";
                add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-API-Key";
                add_header Content-Length 0;
                return 204;
            }

            proxy_pass         http://auth:5000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;

            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-API-Key" always;
        }

        # ── Internal auth validation endpoint (used by auth_request) ─────────
        location = /_auth_validate {
            internal;
            proxy_pass              http://auth:5000/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length   "";
            proxy_set_header        X-Original-URI   $request_uri;
            proxy_set_header        Authorization    $http_authorization;
            proxy_set_header        X-API-Key        $http_x_api_key;
        }

        # ── Public OGC endpoints — no auth ──────────────────────────────────
        location = / {
            proxy_pass http://pygeoapi:80;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header Access-Control-Allow-Origin "*" always;
        }

        location ^~ /openapi {
            proxy_pass http://pygeoapi:80;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header Access-Control-Allow-Origin "*" always;
        }

        location ^~ /conformance {
            proxy_pass http://pygeoapi:80;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header Access-Control-Allow-Origin "*" always;
        }

        location ^~ /api {
            proxy_pass http://pygeoapi:80;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header Access-Control-Allow-Origin "*" always;
        }

        # ── All other OGC endpoints — JWT required ───────────────────────────
        location / {
            limit_req zone=ogc_limit burst=20 nodelay;

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  "*";
                add_header Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS";
                add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-API-Key";
                add_header Content-Length 0;
                return 204;
            }

            # Validate JWT via auth service
            auth_request /_auth_validate;

            # Pass auth headers from validation response to upstream
            auth_request_set $auth_user $upstream_http_x_auth_user;
            auth_request_set $auth_role $upstream_http_x_auth_role;

            # Return proper OGC error on auth failure
            error_page 401 = @auth_error_401;
            error_page 403 = @auth_error_403;

            proxy_pass http://pygeoapi:80;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Auth-User       $auth_user;
            proxy_set_header X-Auth-Role       $auth_role;

            proxy_read_timeout    120s;
            proxy_connect_timeout 10s;
            proxy_send_timeout    120s;

            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-API-Key" always;
            add_header Cache-Control               "max-age=60" always;
            add_header X-Content-Type-Options      "nosniff" always;
            add_header X-Frame-Options             "DENY" always;
        }

        # ── Auth error responses in OGC RFC 7807 format ──────────────────────
        location @auth_error_401 {
            default_type application/problem+json;
            add_header Access-Control-Allow-Origin "*" always;
            return 401 '{"type":"https://www.opengis.net/def/rel/ogc/1.0/exception","title":"Unauthorized","status":401,"detail":"Provide a valid Bearer token in the Authorization header. Login at POST /auth/login"}';
        }

        location @auth_error_403 {
            default_type application/problem+json;
            add_header Access-Control-Allow-Origin "*" always;
            return 403 '{"type":"https://www.opengis.net/def/rel/ogc/1.0/exception","title":"Forbidden","status":403,"detail":"Your token does not have permission to access this resource."}';
        }
    }
}